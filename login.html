
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />

    <style>

        .card{
            /*border: 2px solid red;*/
            width: 20%;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 10px;
            box-shadow: 3px 3px 10px 0px rgba(0, 0, 0, 0.483);
            background-color: whitesmoke;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-size: cover;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmWIRvU4Y5sptJEmzRIavtGuJWs2W0OdfiqA&s');
            
        }
        *{
            font-family: Roboto;
        }
        .font title{
            text-align: centre;
            font-size: 20px;
        }
        .text-input{
            box-sizing: border-box;
            width: 100%;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid black;
        }
        .btn-submit{
            background-color: blueviolet;
            color: rgb(255, 255, 255);
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        
        .forget{
            display: block;
            color: blueviolet;
            text-decoration: none;
            
        }

        .forget-link{
            margin-bottom: 10px;
            text-align: right;
        }
        .sign-link{
            text-align: center;
            margin:20px;
        }
       

    </style>
</head>

<body>
   <div class="card">
        <h2>Login Form</h2>
        <form>
            <label for="">Email Address</label>
            <input class="text-input" type="email" placeholder="Enter Your Email" required>

            <label for="">Password</label>
            <input class="text-input" type="password" placeholder="Enter Your Password" required>
            <a href="#" class="forget forget-link"  >forget password</a>

            <button class="btn-submit">Submit</button>
            <a href="" class="link sign-link">not registered?signup now</a>

            
        </form>
   </div> 
</body>

</html>
